name: iOS Simulator Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/ios-simulator-build.yml"

jobs:
  build-ios-simulator:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode 26.3 if available
        run: |
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          else
            echo "Xcode_26.3.app not found, fallback to default:"
            xcode-select -p
          fi

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Simulator app
        run: flutter build ios --simulator --no-codesign

      - name: Pack simulator Runner.app
        run: |
          cd build/ios/iphonesimulator
          tar -czf Runner.app.tar.gz Runner.app

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-runner-app
          path: build/ios/iphonesimulator/Runner.app.tar.gz
          if-no-files-found: error

