name: iOS Build Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/ios-simulator-build.yml"

jobs:
  build-ios-artifacts:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Simulator app
        run: flutter build ios --simulator --no-codesign

      - name: Pack simulator Runner.app
        run: |
          cd build/ios/iphonesimulator
          tar -czf Runner.app.tar.gz Runner.app

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-runner-app
          path: build/ios/iphonesimulator/Runner.app.tar.gz
          if-no-files-found: error

      - name: Build iOS device app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA for Sideloadly
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qry app-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa-for-sideloadly
          path: build/ios/iphoneos/app-unsigned.ipa
          if-no-files-found: error
